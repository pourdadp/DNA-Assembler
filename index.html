<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧬 DNA Overlap Assembler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 20px; }
        .footer { margin-top: 40px; font-size: 0.9em; color: #666; text-align: center; }
        .navbar { margin-bottom: 30px; }
        .card { margin-bottom: 20px; }
        #graphCanvas { border: 1px solid #ccc; background: white; width: 100%; }
    </style>
</head>
<body class="bg-light">
    <div class="container">
        <h1 class="text-center mb-4">🧬 DNA Overlap Assembler</h1>

        <!-- Input Reads -->
        <div class="card">
            <div class="card-body">
                <h5>Input Reads (one per line)</h5>
                <div class="mb-2">
                    <button class="btn btn-outline-secondary btn-sm" onclick="loadSampleReads()">🔬 Try Sample Reads</button>
                    <button class="btn btn-outline-danger btn-sm" onclick="clearInput()">Clear Input</button>
                </div>
                <textarea id="readsInput" class="form-control" rows="6" style="font-family: monospace;"></textarea>
            </div>
        </div>

        <!-- Parameters -->
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Minimum overlap length:</label>
                        <input type="number" id="minOverlap" class="form-control" value="3" min="1" onchange="updateMismatchField()">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Max consecutive mismatches: <small class="text-muted">(only for overlap ≥ 50)</small></label>
                        <input type="number" id="maxMismatch" class="form-control" value="3" min="0" disabled>
                    </div>
                </div>
                <button class="btn btn-success" onclick="runAssembly()">⚡ Run Assembly</button>
            </div>
        </div>

        <!-- Results -->
        <div id="resultSection" class="card" style="display: none;">
            <div class="card-body">
                <h5>Assembly Result</h5>
                <pre id="resultText" style="background: #f8f9fa; padding: 15px; border-radius: 5px; font-family: monospace;"></pre>
                <canvas id="graphCanvas" height="300"></canvas>
                <div class="mt-3">
                    <button class="btn btn-outline-primary btn-sm" onclick="copyResult()">📋 Copy Result</button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="saveContig()">💾 Save Contig (.seq)</button>
                    <button class="btn btn-outline-danger btn-sm" onclick="clearResults()">🗑️ Clear Results</button>
                </div>
            </div>
        </div>

        <div class="footer">Powered By <strong>Pourdad Panahi</strong></div>
    </div>

    <script>
        // ---------- Bioinformatics Functions ----------
        function reverseComplement(seq) {
            const comp = { 'A': 'T', 'T': 'A', 'C': 'G', 'G': 'C', 'a': 't', 't': 'a', 'c': 'g', 'g': 'c' };
            let rc = '';
            for (let i = seq.length - 1; i >= 0; i--) {
                rc += comp[seq[i]] || seq[i];
            }
            return rc;
        }

        function fuzzyOverlapOk(aSuffix, bPrefix, maxMismatch) {
            let run = 0;
            for (let i = 0; i < aSuffix.length; i++) {
                if (aSuffix[i] !== bPrefix[i]) {
                    run++;
                    if (run > maxMismatch) return false;
                } else {
                    run = 0;
                }
            }
            return true;
        }

        function findOverlap(a, b, minLen, fuzzyThreshold, maxMismatch) {
            let best = 0;
            const maxLen = Math.min(a.length, b.length);
            for (let i = minLen; i <= maxLen; i++) {
                const aSuffix = a.slice(-i);
                const bPrefix = b.slice(0, i);
                if (i >= fuzzyThreshold) {
                    if (fuzzyOverlapOk(aSuffix, bPrefix, maxMismatch)) best = i;
                } else {
                    if (aSuffix === bPrefix) best = i;
                }
            }
            return best;
        }

        function greedyAssemble(reads, minOverlap, fuzzyThreshold, maxMismatch) {
            if (!reads.length) return { contig: '', steps: [], placements: [], remaining: [], total: 0 };

            const sorted = [...reads].sort((a, b) => b.length - a.length);
            const total = sorted.length;
            let bestContig = '';
            let bestSteps = [];
            let bestPlacements = [];
            let bestRemaining = [...sorted];

            for (let seedIdx = 0; seedIdx < sorted.length; seedIdx++) {
                const tempReads = [...sorted];
                const seed = tempReads.splice(seedIdx, 1)[0];
                const placements = [{ seq: seed, start: 0, end: seed.length - 1, mismatches: new Set() }];
                const steps = [{ seq: seed, type: 'seed', side: null, overlap: 0 }];

                let extended = true;
                while (tempReads.length && extended) {
                    const currentContig = resolveAndBuild(placements);
                    let bestIdx = -1, bestOri = 'f', bestSide = 'right', bestOverlap = 0, bestSeq = null;

                    for (let i = 0; i < tempReads.length; i++) {
                        const read = tempReads[i];
                        let ov = findOverlap(currentContig, read, minOverlap, fuzzyThreshold, maxMismatch);
                        if (ov > bestOverlap) { bestOverlap = ov; bestIdx = i; bestOri = 'f'; bestSide = 'right'; bestSeq = read; }
                        ov = findOverlap(read, currentContig, minOverlap, fuzzyThreshold, maxMismatch);
                        if (ov > bestOverlap) { bestOverlap = ov; bestIdx = i; bestOri = 'f'; bestSide = 'left'; bestSeq = read; }
                        const rc = reverseComplement(read);
                        ov = findOverlap(currentContig, rc, minOverlap, fuzzyThreshold, maxMismatch);
                        if (ov > bestOverlap) { bestOverlap = ov; bestIdx = i; bestOri = 'r'; bestSide = 'right'; bestSeq = rc; }
                        ov = findOverlap(rc, currentContig, minOverlap, fuzzyThreshold, maxMismatch);
                        if (ov > bestOverlap) { bestOverlap = ov; bestIdx = i; bestOri = 'r'; bestSide = 'left'; bestSeq = rc; }
                    }

                    if (bestIdx === -1) { extended = false; break; }

                    const chosen = tempReads.splice(bestIdx, 1)[0];
                    const orientedSeq = bestSeq;
                    steps.push({ seq: chosen, type: 'add', orientation: bestOri === 'f' ? 'forward' : 'rev.comp', side: bestSide, overlap: bestOverlap });

                    const mismatchSet = new Set();
                    if (bestOverlap >= fuzzyThreshold) {
                        if (bestSide === 'right') {
                            const overlapStart = currentContig.length - bestOverlap;
                            for (let j = 0; j < bestOverlap; j++) {
                                if (currentContig[overlapStart + j] !== orientedSeq[j]) mismatchSet.add(overlapStart + j);
                            }
                        } else {
                            for (let j = 0; j < bestOverlap; j++) {
                                if (orientedSeq[orientedSeq.length - bestOverlap + j] !== currentContig[j]) mismatchSet.add(j);
                            }
                        }
                    }

                    if (bestSide === 'right') {
                        const startPos = currentContig.length - bestOverlap;
                        const endPos = startPos + orientedSeq.length - 1;
                        placements.push({ seq: chosen, start: startPos, end: endPos, mismatches: mismatchSet });
                    } else {
                        const shift = orientedSeq.length - bestOverlap;
                        placements.forEach(p => { p.start += shift; p.end += shift; p.mismatches = new Set([...p.mismatches].map(x => x + shift)); });
                        placements.push({ seq: chosen, start: 0, end: orientedSeq.length - 1, mismatches: new Set([...mismatchSet].map(x => x + shift)) });
                    }
                }

                const contig = resolveAndBuild(placements);
                if (contig.length > bestContig.length) {
                    bestContig = contig;
                    bestSteps = steps;
                    bestPlacements = placements;
                    bestRemaining = [...tempReads];
                    break;
                }
            }
            return { contig: bestContig, steps: bestSteps, placements: bestPlacements, remaining: bestRemaining, total };
        }

        function resolveAndBuild(placements) {
            if (!placements.length) return '';
            const maxPos = Math.max(...placements.map(p => p.end)) + 1;
            const candidates = Array.from({ length: maxPos }, () => []);
            placements.forEach(({ seq, start, end }) => {
                for (let pos = start; pos <= end; pos++) {
                    const idx = pos - start;
                    const base = seq[idx];
                    const dist = Math.min(idx, seq.length - 1 - idx);
                    candidates[pos].push({ base, dist });
                }
            });
            return candidates.map(c => c.length ? c.reduce((a, b) => a.dist >= b.dist ? a : b).base : 'N').join('');
        }

        function buildCoverage(placements, contigLen) {
            const cov = new Array(contigLen).fill(0);
            placements.forEach(({ start, end }) => { for (let i = start; i <= end; i++) cov[i]++; });
            return cov;
        }

        // ---------- UI Functions ----------
        function updateMismatchField() {
            const minOv = parseInt(document.getElementById('minOverlap').value) || 0;
            const mismatchField = document.getElementById('maxMismatch');
            if (minOv < 50) {
                mismatchField.disabled = true;
                mismatchField.value = '0';
            } else {
                mismatchField.disabled = false;
                if (mismatchField.value === '0') mismatchField.value = '3';
            }
        }

        function loadSampleReads() {
            document.getElementById('readsInput').value = "ATGCGA\nCGATTC\nGAATTCG";
            document.getElementById('minOverlap').value = '3';
            updateMismatchField();
        }

        function clearInput() {
            document.getElementById('readsInput').value = '';
        }

        function clearResults() {
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('resultText').textContent = '';
            const canvas = document.getElementById('graphCanvas');
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        }

        function runAssembly() {
            const raw = document.getElementById('readsInput').value.trim();
            if (!raw) { alert('Please enter at least one sequence.'); return; }
            const reads = raw.split('\n').map(s => s.trim().toUpperCase()).filter(s => s);
            if (!reads.length) { alert('No valid reads found.'); return; }
            const minOv = parseInt(document.getElementById('minOverlap').value) || 3;
            const maxMis = parseInt(document.getElementById('maxMismatch').value) || 0;

            const { contig, steps, placements, remaining, total } = greedyAssemble(reads, minOv, 50, maxMis);
            if (!contig) { alert('Could not assemble any reads with the given parameters.'); return; }

            const cov = buildCoverage(placements, contig.length);

            let resultStr = `=== CONTIG (${contig.length} bp) ===\n${contig}\n\n`;
            resultStr += `=== ASSEMBLY SUMMARY ===\n${steps.length} of ${total} reads assembled.\n`;
            if (remaining.length) resultStr += `${remaining.length} read(s) unused.\n`;
            resultStr += '\n=== ASSEMBLY STEPS ===\n';
            steps.forEach(s => {
                if (s.type === 'seed') resultStr += `Seed: ${s.seq} (length ${s.seq.length})\n`;
                else resultStr += `Add ${s.seq} (${s.orientation}, ${s.side}), overlap=${s.overlap}\n`;
            });
            if (remaining.length) resultStr += `\n=== UNUSED READS ===\n${remaining.join(', ')}\n`;

            document.getElementById('resultText').textContent = resultStr;
            document.getElementById('resultSection').style.display = 'block';
            drawGraph(contig, placements, cov);
        }

        function drawGraph(contig, placements, cov) {
            const canvas = document.getElementById('graphCanvas');
            const ctx = canvas.getContext('2d');
            const width = canvas.parentElement.clientWidth;
            canvas.width = width;
            const height = 300;
            canvas.height = height;

            const margin = 50;
            const drawW = width - 2 * margin;
            const scale = drawW / contig.length;

            const numReads = placements.length;
            const readH = Math.max(6, Math.min(20, (height - 40) / numReads));
            const yStart = 30;

            placements.forEach(({ seq, start, end, mismatches }, idx) => {
                const y = yStart + idx * (readH + 4);
                const x1 = margin + start * scale;
                const x2 = margin + (end + 1) * scale;

                ctx.fillStyle = 'red';
                ctx.fillRect(x1, y, x2 - x1, readH);

                for (let pos = start; pos <= end; pos++) {
                    if (cov[pos] > 1) {
                        ctx.fillStyle = 'green';
                        ctx.fillRect(margin + pos * scale, y, scale, readH);
                    }
                }
                mismatches.forEach(pos => {
                    ctx.fillStyle = 'yellow';
                    ctx.fillRect(margin + pos * scale, y, scale, readH);
                });

                ctx.fillStyle = 'black';
                ctx.font = '8px Arial';
                const label = seq.length > 12 ? seq.slice(0, 12) + '..' : seq;
                ctx.fillText(label, margin - 45, y + readH / 2 + 3);
            });

            // Scale bar
            const barY = yStart + numReads * (readH + 4) + 10;
            ctx.strokeStyle = 'black';
            ctx.beginPath();
            ctx.moveTo(margin, barY);
            ctx.lineTo(margin + drawW, barY);
            ctx.stroke();
            const step = Math.max(1, Math.floor(contig.length / 10));
            for (let i = 0; i <= contig.length; i += step) {
                const x = margin + i * scale;
                ctx.beginPath();
                ctx.moveTo(x, barY - 5);
                ctx.lineTo(x, barY + 5);
                ctx.stroke();
                ctx.fillText(i, x - 5, barY + 15);
            }
        }

        function copyResult() {
            const text = document.getElementById('resultText').textContent;
            if (text) {
                navigator.clipboard.writeText(text).then(() => alert('Result copied to clipboard.'));
            } else {
                alert('No result to copy.');
            }
        }

        function saveContig() {
            const text = document.getElementById('resultText').textContent;
            if (!text) { alert('Run a successful assembly first.'); return; }
            const lines = text.split('\n');
            let contig = '';
            let capture = false;
            for (const line of lines) {
                if (line.startsWith('=== CONTIG')) { capture = true; continue; }
                if (capture) {
                    if (line.startsWith('===') || line.trim() === '') break;
                    contig += line.trim();
                }
            }
            if (!contig) { alert('No contig found.'); return; }
            const blob = new Blob(['>contig (assembled)\n' + contig.match(/.{1,70}/g).join('\n')], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'contig.seq';
            a.click();
        }

        // Initialize
        updateMismatchField();
    </script>
</body>
</html>
