<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧬 DNA Overlap Assembler</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; background: #f5f7fa; }
        .container { max-width: 900px; margin: auto; }
        textarea, input, button { font-size: 16px; padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        button { background: #2d6a4f; color: white; border: none; border-radius: 6px; cursor: pointer; width: auto; padding: 10px 20px; }
        button:hover { background: #1b4d3a; }
        .footer { text-align: center; margin-top: 30px; color: #666; }
        #graphCanvas { border: 1px solid #ccc; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧬 DNA Overlap Assembler</h1>

        <div class="card">
            <h5>Input Reads (one per line)</h5>
            <div>
                <button onclick="loadSampleReads()">🔬 Try Sample Reads</button>
                <button onclick="clearInput()">Clear Input</button>
            </div>
            <textarea id="readsInput" rows="6" style="font-family: monospace;"></textarea>
        </div>

        <div class="card">
            <label>Minimum overlap length:</label>
            <input type="number" id="minOverlap" value="3" min="1" onchange="updateMismatchField()">
            <label>Max consecutive mismatches (for overlap ≥ 50):</label>
            <input type="number" id="maxMismatch" value="3" min="0" disabled>
            <button onclick="runAssembly()">⚡ Run Assembly</button>
        </div>

        <div id="resultSection" class="card" style="display: none;">
            <h5>Assembly Result</h5>
            <pre id="resultText" style="background: #eee; padding: 10px; font-family: monospace;"></pre>
            <canvas id="graphCanvas" height="300"></canvas>
            <div>
                <button onclick="copyResult()">📋 Copy</button>
                <button onclick="saveContig()">💾 Save .seq</button>
                <button onclick="clearResults()">🗑️ Clear</button>
            </div>
        </div>

        <div class="footer">Powered By <strong>Pourdad Panahi</strong></div>
    </div>

    <script>
        // ---------- Bioinformatics Functions ----------
        function reverseComplement(seq) {
            const comp = { A: 'T', T: 'A', C: 'G', G: 'C', a: 't', t: 'a', c: 'g', g: 'c' };
            return [...seq].reverse().map(b => comp[b] || b).join('');
        }

        function fuzzyOverlapOk(aSuffix, bPrefix, maxMismatch) {
            let run = 0;
            for (let i = 0; i < aSuffix.length; i++) {
                if (aSuffix[i] !== bPrefix[i]) { run++; if (run > maxMismatch) return false; }
                else run = 0;
            }
            return true;
        }

        function findOverlap(a, b, minLen, fuzzyThreshold, maxMismatch) {
            let best = 0;
            const maxLen = Math.min(a.length, b.length);
            for (let i = minLen; i <= maxLen; i++) {
                const aSuffix = a.slice(-i);
                const bPrefix = b.slice(0, i);
                if (i >= fuzzyThreshold) {
                    if (fuzzyOverlapOk(aSuffix, bPrefix, maxMismatch)) best = i;
                } else {
                    if (aSuffix === bPrefix) best = i;
                }
            }
            return best;
        }

        function findContainment(contig, read) {
            if (contig.includes(read)) return { contained: true, type: 'forward' };
            const rc = reverseComplement(read);
            if (contig.includes(rc)) return { contained: true, type: 'reverse' };
            return { contained: false };
        }

        function greedyAssemble(reads, minOverlap, fuzzyThreshold, maxMismatch) {
            if (!reads.length) return { contig: '', steps: [], placements: [], remaining: [], total: 0 };
            const sorted = [...reads].sort((a, b) => b.length - a.length);
            const total = sorted.length;
            let bestContig = '', bestSteps = [], bestPlacements = [], bestRemaining = [...sorted];

            for (let seedIdx = 0; seedIdx < sorted.length; seedIdx++) {
                const tempReads = [...sorted];
                const seed = tempReads.splice(seedIdx, 1)[0];
                const placements = [{ seq: seed, start: 0, end: seed.length - 1, mismatches: new Set() }];
                const steps = [{ seq: seed, type: 'seed', side: null, overlap: 0 }];
                let extended = true;
                while (tempReads.length && extended) {
                    const currentContig = resolveAndBuild(placements);
                    let bestAction = null;

                    // 1. Containment check
                    for (let i = 0; i < tempReads.length; i++) {
                        const read = tempReads[i];
                        if (findContainment(currentContig, read).contained) {
                            bestAction = { type: 'contained', idx: i, read: read };
                            break;
                        }
                        if (findContainment(read, currentContig).contained) {
                            bestAction = { type: 'replace', idx: i, read: read };
                            break;
                        }
                    }

                    if (bestAction) {
                        if (bestAction.type === 'contained') {
                            tempReads.splice(bestAction.idx, 1);
                            steps.push({ seq: bestAction.read, type: 'contained' });
                            continue;
                        } else {
                            const chosen = tempReads.splice(bestAction.idx, 1)[0];
                            const newSeq = findContainment(chosen, currentContig).type === 'forward' ? chosen : reverseComplement(chosen);
                            placements.length = 0;
                            placements.push({ seq: newSeq, start: 0, end: newSeq.length - 1, mismatches: new Set() });
                            steps.push({ seq: chosen, type: 'replace' });
                            continue;
                        }
                    }

                    // 2. Overlap search
                    let bestIdx = -1, bestOri = 'f', bestSide = 'right', bestOverlap = 0, bestSeq = null;
                    for (let i = 0; i < tempReads.length; i++) {
                        const read = tempReads[i];
                        let ov = findOverlap(currentContig, read, minOverlap, fuzzyThreshold, maxMismatch);
                        if (ov > bestOverlap) { bestOverlap=ov; bestIdx=i; bestOri='f'; bestSide='right'; bestSeq=read; }
                        ov = findOverlap(read, currentContig, minOverlap, fuzzyThreshold, maxMismatch);
                        if (ov > bestOverlap) { bestOverlap=ov; bestIdx=i; bestOri='f'; bestSide='left'; bestSeq=read; }
                        const rc = reverseComplement(read);
                        ov = findOverlap(currentContig, rc, minOverlap, fuzzyThreshold, maxMismatch);
                        if (ov > bestOverlap) { bestOverlap=ov; bestIdx=i; bestOri='r'; bestSide='right'; bestSeq=rc; }
                        ov = findOverlap(rc, currentContig, minOverlap, fuzzyThreshold, maxMismatch);
                        if (ov > bestOverlap) { bestOverlap=ov; bestIdx=i; bestOri='r'; bestSide='left'; bestSeq=rc; }
                    }

                    if (bestIdx === -1) { extended = false; break; }

                    const chosenRead = tempReads.splice(bestIdx, 1)[0];
                    const orientedSeq = bestSeq;
                    steps.push({ seq: chosenRead, type: 'add', orientation: bestOri, side: bestSide, overlap: bestOverlap });

                    const mismatchSet = new Set();
                    if (bestOverlap >= fuzzyThreshold) {
                        if (bestSide === 'right') {
                            const overlapStart = currentContig.length - bestOverlap;
                            for (let j = 0; j < bestOverlap; j++) {
                                if (currentContig[overlapStart + j] !== orientedSeq[j]) mismatchSet.add(overlapStart + j);
                            }
                        } else {
                            for (let j = 0; j < bestOverlap; j++) {
                                if (orientedSeq[orientedSeq.length - bestOverlap + j] !== currentContig[j]) mismatchSet.add(j);
                            }
                        }
                    }

                    if (bestSide === 'right') {
                        placements.push({ seq: chosenRead, start: currentContig.length - bestOverlap, end: currentContig.length - bestOverlap + orientedSeq.length - 1, mismatches: mismatchSet });
                    } else {
                        const shift = orientedSeq.length - bestOverlap;
                        placements.forEach(p => { p.start += shift; p.end += shift; });
                        placements.push({ seq: chosenRead, start: 0, end: orientedSeq.length - 1, mismatches: new Set() });
                    }
                }
                const contig = resolveAndBuild(placements);
                if (contig.length > bestContig.length) {
                    bestContig = contig; bestSteps = steps; bestPlacements = placements; bestRemaining = [...tempReads];
                    break;
                }
            }
            return { contig: bestContig, steps: bestSteps, placements: bestPlacements, remaining: bestRemaining, total };
        }

        function resolveAndBuild(placements) {
            if (!placements.length) return '';
            const maxPos = Math.max(...placements.map(p => p.end)) + 1;
            const candidates = Array.from({ length: maxPos }, () => []);
            placements.forEach(({ seq, start, end }) => {
                for (let i = start; i <= end; i++) {
                    const idx = i - start;
                    candidates[i].push({ base: seq[idx], dist: Math.min(idx, seq.length - 1 - idx) });
                }
            });
            return candidates.map(c => c.reduce((a, b) => a.dist >= b.dist ? a : b).base).join('');
        }

        function buildCoverage(placements) {
            const len = Math.max(...placements.map(p => p.end)) + 1;
            const cov = new Array(len).fill(0);
            placements.forEach(({ start, end }) => { for (let i = start; i <= end; i++) cov[i]++; });
            return cov;
        }

        // ---------- UI ----------
        function updateMismatchField() {
            const minOv = +document.getElementById('minOverlap').value;
            const mm = document.getElementById('maxMismatch');
            mm.disabled = minOv < 50;
            if (minOv < 50) mm.value = '0';
        }
        function loadSampleReads() {
            document.getElementById('readsInput').value = "ATGCGT\nTGCG\nGCGTAA";
            document.getElementById('minOverlap').value = 3;
            updateMismatchField();
        }
        function clearInput() { document.getElementById('readsInput').value = ''; }
        function clearResults() {
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('resultText').textContent = '';
            document.getElementById('graphCanvas').getContext('2d').clearRect(0,0,800,300);
        }
        function runAssembly() {
            const raw = document.getElementById('readsInput').value.trim();
            if (!raw) return alert('Enter reads.');
            const reads = raw.split('\n').map(s => s.trim().toUpperCase()).filter(s => s);
            const minOv = +document.getElementById('minOverlap').value || 3;
            const maxMis = +document.getElementById('maxMismatch').value || 0;
            const result = greedyAssemble(reads, minOv, 50, maxMis);
            document.getElementById('resultText').textContent =
                `=== CONTIG (${result.contig.length} bp) ===\n${result.contig}\n\n${result.steps.length} of ${result.total} reads assembled.\n`;
            document.getElementById('resultSection').style.display = 'block';
            drawGraph(result.contig, result.placements, buildCoverage(result.placements));
        }
        function drawGraph(contig, placements, cov) {
            const canvas = document.getElementById('graphCanvas');
            canvas.width = canvas.parentElement.clientWidth;
            const ctx = canvas.getContext('2d');
            const w = canvas.width - 100, scale = w / contig.length;
            placements.forEach((p, i) => {
                const y = 30 + i * 25, x1 = 50 + p.start * scale, x2 = 50 + (p.end + 1) * scale;
                ctx.fillStyle = 'red'; ctx.fillRect(x1, y, x2 - x1, 20);
                for (let pos = p.start; pos <= p.end; pos++) {
                    if (cov[pos] > 1) { ctx.fillStyle = 'green'; ctx.fillRect(50 + pos * scale, y, scale, 20); }
                    if (p.mismatches && p.mismatches.has(pos)) { ctx.fillStyle = 'yellow'; ctx.fillRect(50 + pos * scale, y, scale, 20); }
                }
            });
        }
        function copyResult() {
            navigator.clipboard.writeText(document.getElementById('resultText').textContent);
            alert('Copied!');
        }
        function saveContig() {
            const contig = document.getElementById('resultText').textContent.split('\n')[1];
            const blob = new Blob([contig], { type: 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'contig.fasta'; a.click();
        }
        updateMismatchField();
    </script>
</body>
</html>
